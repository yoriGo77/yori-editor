# 推送形如 v0.4.0 的 tag 后自动构建并创建 GitHub Release，附带 Obsidian 安装所需的三个文件。
# 发布前请先在 manifest.json 与 package.json 中 bump 版本号并提交，再打同名 tag。
name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Obsidian 社区上架自检：Release「标题」须与 manifest.json.version 完全一致（不要带 v 前缀）。
      - name: Read manifest version for release title
        id: manifest_version
        run: echo "version=$(node -p "JSON.parse(require('fs').readFileSync('manifest.json','utf8')).version")" >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.manifest_version.outputs.version }}
          files: |
            main.js
            manifest.json
            styles.css
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
