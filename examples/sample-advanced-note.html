<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>示例：Yori 风格 HTML 笔记预览</title>
    <style>
      /* 与插件 UI 参考色接近，便于你对照「舒适、整洁」观感 */
      body {
        margin: 0;
        padding: 24px 28px 48px;
        max-width: 720px;
        margin-inline: auto;
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        font-size: 16px;
        line-height: 1.65;
        color: #403931;
        background: #ffffff;
      }
      h1 {
        font-size: 1.35rem;
        font-weight: 600;
        color: #4a4238;
        border-bottom: 1px solid #dfd7c9;
        padding-bottom: 10px;
        margin-top: 0;
      }
      .muted {
        color: #99876c;
        font-size: 13px;
        margin-bottom: 28px;
      }
      p {
        margin: 0 0 14px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin: 20px 0;
        font-size: 14px;
      }
      th,
      td {
        border: 1px solid #a4a098;
        padding: 10px 12px;
        vertical-align: top;
      }
      th {
        background: #dfd7c9;
        font-weight: 600;
      }
      tr:nth-child(even) td {
        background: #f4efe6;
      }
      .highlight {
        background-color: #f8f5dd;
        padding: 0 4px;
      }
      .todo-row td:first-child {
        text-align: center;
        width: 44px;
      }
    </style>
  </head>
  <body>
    <h1>这是一份「长得像笔记」的 HTML 示例</h1>
    <p class="muted">
      用浏览器打开本文件即可看到排版效果。若在 Obsidian 里作为 .html
      入库，默认可能是预览或源码，取决于 Obsidian 对该扩展名的处理。
    </p>

    <p>
      正文支持<strong>加粗</strong>、<em>倾斜</em>、<span style="color: #91c5df">彩色字</span>与
      <span class="highlight">高亮背景</span>（均为普通 HTML + CSS）。
    </p>

    <table>
      <thead>
        <tr>
          <th>事项</th>
          <th>说明</th>
        </tr>
      </thead>
      <tbody>
        <tr class="todo-row">
          <td><input type="checkbox" /></td>
          <td>待办样例（HTML 复选框）</td>
        </tr>
        <tr>
          <td>2</td>
          <td>表格单元格可直接写段落与<br />换行。</td>
        </tr>
      </tbody>
    </table>

    <p style="text-align: center; color: #99876c">
      居中段落示例 · 行距与段间距由 HTML/CSS 控制，而不是 Markdown 语法。
    </p>
  </body>
</html>
